<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f0f2f5;
      color: #333;
    }

    /* navbar */
    nav {
      background-color: white;
      padding: 14px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    nav h1 {
      font-size: 1.2rem;
      color: #4361ee;
      font-weight: 600;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-right span {
      font-size: 0.875rem;
      color: #666;
    }

    .logout-btn {
      padding: 7px 16px;
      background: transparent;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      color: #666;
      cursor: pointer;
    }

    .logout-btn:hover {
      background-color: #fff0f0;
      border-color: #ffcdd2;
      color: #d32f2f;
    }

    /* main container */
    .container {
      max-width: 860px;
      margin: 30px auto;
      padding: 0 20px;
    }

    /* stats */
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: white;
      border-radius: 8px;
      padding: 18px 22px;
      flex: 1;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border-left: 4px solid #4361ee;
    }

    .stat-box.pending {
      border-left-color: #f4a261;
    }

    .stat-box.done {
      border-left-color: #2a9d8f;
    }

    .stat-box .num {
      font-size: 1.8rem;
      font-weight: 600;
      color: #222;
    }

    .stat-box .lbl {
      font-size: 0.8rem;
      color: #888;
      margin-top: 2px;
    }

    /* add task section */
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 14px;
    }

    .add-task-box {
      background: white;
      border-radius: 8px;
      padding: 22px 24px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 5px;
    }

    input, select, textarea {
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.875rem;
      font-family: 'Poppins', sans-serif;
      color: #333;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #4361ee;
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    .add-btn {
      padding: 10px 24px;
      background-color: #4361ee;
      color: white;
      border: none;
      border-radius: 6px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
    }

    .add-btn:hover {
      background-color: #3451d1;
    }

    .add-btn:disabled {
      background-color: #aaa;
      cursor: not-allowed;
    }

    /* filters */
    .filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-row input[type="text"],
    .filter-row select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: 'Poppins', sans-serif;
      color: #333;
      outline: none;
    }

    .filter-row input[type="text"] {
      flex: 1;
      min-width: 180px;
    }

    .task-count {
      margin-left: auto;
      font-size: 0.82rem;
      color: #888;
    }

    /* task cards */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-card {
      background: white;
      border-radius: 8px;
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border-left: 3px solid #4361ee;
    }

    .task-card.priority-high {
      border-left-color: #e63946;
    }

    .task-card.priority-medium {
      border-left-color: #f4a261;
    }

    .task-card.priority-low {
      border-left-color: #2a9d8f;
    }

    .task-card.completed {
      opacity: 0.6;
    }

    .task-checkbox {
      margin-top: 3px;
      width: 17px;
      height: 17px;
      cursor: pointer;
      flex-shrink: 0;
      accent-color: #4361ee;
    }

    .task-info {
      flex: 1;
      min-width: 0;
    }

    .task-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: #222;
      margin-bottom: 3px;
    }

    .task-card.completed .task-title {
      text-decoration: line-through;
      color: #999;
    }

    .task-desc {
      font-size: 0.8rem;
      color: #777;
      margin-bottom: 8px;
    }

    .task-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .priority-badge {
      font-size: 0.75rem;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    .priority-badge.high {
      background-color: #fdecea;
      color: #c62828;
    }

    .priority-badge.medium {
      background-color: #fff3e0;
      color: #e65100;
    }

    .priority-badge.low {
      background-color: #e8f5e9;
      color: #1b5e20;
    }

    .due-text {
      font-size: 0.78rem;
      color: #888;
    }

    .due-text.overdue {
      color: #d32f2f;
      font-weight: 500;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .action-btn {
      padding: 5px 12px;
      font-size: 0.78rem;
      font-family: 'Poppins', sans-serif;
      border-radius: 5px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      color: #555;
    }

    .action-btn:hover {
      background-color: #f5f5f5;
    }

    .action-btn.delete:hover {
      background-color: #fff0f0;
      border-color: #ffcdd2;
      color: #d32f2f;
    }

    /* empty state */
    .empty-msg {
      text-align: center;
      padding: 50px 20px;
      color: #aaa;
      font-size: 0.9rem;
    }

    /* alert message below add form */
    .alert {
      padding: 9px 14px;
      border-radius: 6px;
      font-size: 0.83rem;
      margin-top: 10px;
      display: none;
    }

    .alert.error {
      background-color: #fff0f0;
      color: #d32f2f;
      border: 1px solid #ffcdd2;
      display: block;
    }

    .alert.success {
      background-color: #f0fff4;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
      display: block;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav>
  <h1>📋 Task Manager</h1>
  <div class="nav-right">
    <span>Hello, <strong id="user-name">User</strong></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="num" id="stat-total">0</div>
      <div class="lbl">Total Tasks</div>
    </div>
    <div class="stat-box pending">
      <div class="num" id="stat-pending">0</div>
      <div class="lbl">Pending</div>
    </div>
    <div class="stat-box done">
      <div class="num" id="stat-done">0</div>
      <div class="lbl">Completed</div>
    </div>
  </div>

  <!-- Add Task -->
  <div class="add-task-box">
    <div class="section-title">Add New Task</div>
    <div class="form-row">
      <div class="form-group" style="flex: 2">
        <label>Title *</label>
        <input type="text" id="task-title" placeholder="Enter task title" />
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="task-priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" id="task-due" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex: 1">
        <label>Description (optional)</label>
        <textarea id="task-desc" placeholder="Add more details..."></textarea>
      </div>
    </div>
    <button class="add-btn" id="add-btn" onclick="addTask()">+ Add Task</button>
    <div class="alert" id="add-alert"></div>
  </div>

  <!-- Filter & Search -->
  <div class="filter-row">
    <input type="text" id="search-input" placeholder="Search tasks..." oninput="renderTasks()" />
    <select id="filter-status" onchange="renderTasks()">
      <option value="">All</option>
      <option value="false">Pending</option>
      <option value="true">Completed</option>
    </select>
    <select id="filter-priority" onchange="renderTasks()">
      <option value="">All Priority</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <span class="task-count" id="task-count"></span>
  </div>

  <!-- Task List -->
  <div class="task-list" id="task-list">
    <div class="empty-msg">Loading tasks...</div>
  </div>

</div>

<script>
  const API = 'http://localhost:5000/api';
  let allTasks = [];

  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || '{}');

  if (!token) {
    window.location.href = 'index.html';
  }

  document.getElementById('user-name').textContent = user.name || user.email || 'User';

  function getHeaders() {
    return {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    };
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'index.html';
  }

  function showAlert(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'alert ' + type;
    setTimeout(function() { el.className = 'alert'; }, 4000);
  }

  async function loadTasks() {
    try {
      const response = await fetch(API + '/tasks?limit=100', { headers: getHeaders() });

      if (response.status === 401) {
        logout();
        return;
      }

      const data = await response.json();
      allTasks = data.tasks || [];
      updateStats();
      renderTasks();

    } catch (err) {
      document.getElementById('task-list').innerHTML = '<div class="empty-msg">Could not load tasks. Check server connection.</div>';
    }
  }

  function updateStats() {
    const done = allTasks.filter(function(t) { return t.completed; }).length;
    document.getElementById('stat-total').textContent = allTasks.length;
    document.getElementById('stat-pending').textContent = allTasks.length - done;
    document.getElementById('stat-done').textContent = done;
  }

  function renderTasks() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const status = document.getElementById('filter-status').value;
    const priority = document.getElementById('filter-priority').value;

    let filtered = allTasks.filter(function(t) {
      const matchSearch = t.title.toLowerCase().includes(search) || (t.description || '').toLowerCase().includes(search);
      const matchStatus = status === '' || String(t.completed) === status;
      const matchPriority = priority === '' || t.priority === priority;
      return matchSearch && matchStatus && matchPriority;
    });

    document.getElementById('task-count').textContent = filtered.length + ' task(s)';

    const list = document.getElementById('task-list');

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-msg">' + (allTasks.length === 0 ? 'No tasks yet. Add one above!' : 'No tasks match your filters.') + '</div>';
      return;
    }

    list.innerHTML = filtered.map(function(task) {
      var due = null;
      if (task.dueDate) {
        due = task.dueDate._seconds ? new Date(task.dueDate._seconds * 1000) : new Date(task.dueDate);
      }
      var overdue = due && !task.completed && due < new Date();
      var dueStr = due ? due.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '';

      return '<div class="task-card priority-' + task.priority + (task.completed ? ' completed' : '') + '">' +
        '<input type="checkbox" class="task-checkbox" ' + (task.completed ? 'checked' : '') + ' onchange="toggleTask(\'' + task.id + '\', ' + task.completed + ')" />' +
        '<div class="task-info">' +
          '<div class="task-title">' + escHtml(task.title) + '</div>' +
          (task.description ? '<div class="task-desc">' + escHtml(task.description) + '</div>' : '') +
          '<div class="task-meta">' +
            '<span class="priority-badge ' + task.priority + '">' + task.priority + '</span>' +
            (dueStr ? '<span class="due-text' + (overdue ? ' overdue' : '') + '">' + (overdue ? '⚠ Overdue: ' : 'Due: ') + dueStr + '</span>' : '') +
          '</div>' +
        '</div>' +
        '<div class="task-actions">' +
          '<button class="action-btn" onclick="goToTask(\'' + task.id + '\')">Edit</button>' +
          '<button class="action-btn delete" onclick="deleteTask(\'' + task.id + '\')">Delete</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  async function addTask() {
    const title = document.getElementById('task-title').value.trim();
    const desc = document.getElementById('task-desc').value.trim();
    const priority = document.getElementById('task-priority').value;
    const dueDate = document.getElementById('task-due').value;

    if (!title) {
      showAlert('add-alert', 'Please enter a task title.', 'error');
      return;
    }

    const btn = document.getElementById('add-btn');
    btn.disabled = true;
    btn.textContent = 'Adding...';

    try {
      const response = await fetch(API + '/tasks', {
        method: 'POST',
        headers: getHeaders(),
        body: JSON.stringify({
          title: title,
          description: desc,
          priority: priority,
          dueDate: dueDate || undefined
        })
      });

      const data = await response.json();

      if (!response.ok) {
        showAlert('add-alert', data.message || 'Failed to add task.', 'error');
        return;
      }

      document.getElementById('task-title').value = '';
      document.getElementById('task-desc').value = '';
      document.getElementById('task-due').value = '';
      showAlert('add-alert', 'Task added successfully!', 'success');
      await loadTasks();

    } catch (err) {
      showAlert('add-alert', 'Server error. Please try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '+ Add Task';
    }
  }

  async function toggleTask(id, currentStatus) {
    try {
      await fetch(API + '/tasks/' + id, {
        method: 'PUT',
        headers: getHeaders(),
        body: JSON.stringify({ completed: !currentStatus })
      });
      await loadTasks();
    } catch (err) {
      alert('Could not update task. Please try again.');
    }
  }

  async function deleteTask(id) {
    if (!confirm('Are you sure you want to delete this task?')) return;

    try {
      await fetch(API + '/tasks/' + id, {
        method: 'DELETE',
        headers: getHeaders()
      });
      await loadTasks();
    } catch (err) {
      alert('Could not delete task. Please try again.');
    }
  }

  function goToTask(id) {
    window.location.href = 'task-detail.html?id=' + id;
  }

  function escHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // submit on Enter
  document.getElementById('task-title').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addTask();
  });

  loadTasks();
</script>

</body>
</html>
